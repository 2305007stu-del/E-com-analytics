<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AD Senpai's Studio | Gallery of Legends</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-C4Q31PLNC5"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-YOURID');
    </script>

    <style>
        body {
            background-color: #0f0f0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
        }

        header {
            padding: 50px 0;
            border-bottom: 2px solid #d4af37;
            margin-bottom: 40px;
        }

        h1 {
            color: #d4af37;
            letter-spacing: 5px;
            font-size: 3rem;
            margin: 0;
        }

        .tagline {
            font-style: italic;
            color: #888;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .product-card {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 20px;
            border-radius: 10px;
            transition: transform 0.3s, border-color 0.3s;
        }

        .product-card:hover {
            transform: translateY(-10px);
            border-color: #d4af37;
        }

        .product-img {
            width: 100%;
            height: 200px;
            background: #252525;
            border-radius: 5px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #444;
            font-weight: bold;
        }

        button {
            background-color: transparent;
            color: #d4af37;
            border: 2px solid #d4af37;
            padding: 10px 20px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            width: 100%;
        }

        button:hover {
            background-color: #d4af37;
            color: black;
        }
    </style>
</head>

<body>

    <header>
        <h1>AD SENPAI'S STUDIO</h1>
        <p class="tagline">UNLEASH THE POWER. DEFINE YOUR LEGEND.</p>
    </header>

    <div class="gallery">
        <div class="product-card">
            <div class="product-img"><img
                    src="https://images-cdn.ubuy.co.in/634ec0ed0ed9a21327070408-funko-pop-animation-naruto-naruto.jpg"
                    height="150" width="150"></div>
            <h3>Naruto Uzumaki</h3>
            <p>Limited Edition Glow-in-the-dark</p>
            <button class="shop-btn" data-product="Naruto Figure">VIEW DETAILS</button>
        </div>

        <div class="product-card">
            <div class="product-img"><img
                    src="https://m.media-amazon.com/images/I/61fRICQrRIL._AC_UF1000,1000_QL80_.jpg" height="150"
                    width="150"></div>
            <h3>Son Goku</h3>
            <p>Masterlise High-Detail Series</p>
            <button class="shop-btn" data-product="Goku Figure">VIEW DETAILS</button>
        </div>

        <div class="product-card">
            <div class="product-img"><img src="https://m.media-amazon.com/images/I/71K2hBR-jGL.jpg" height="150"
                    width="150"></div>
            <h3>Naruto Funko</h3>
            <p>Vinyl Collectible Figure</p>
            <button class="shop-btn" data-product="Naruto Funko">VIEW DETAILS</button>
        </div>
    </div>

    <script>
        // Track clicks for ANY button with the 'shop-btn' class
        const buttons = document.querySelectorAll('.shop-btn');

        buttons.forEach(button => {
            button.addEventListener('click', function () {
                const productName = this.getAttribute('data-product');

                // Analytics Tracking
                gtag('event', 'select_content', {
                    'content_type': 'product',
                    'item_id': productName
                });

                alert('Summoning ' + productName + ' details! Interaction tracked in Google Analytics.');
            });
        });
    </script>

</body>

</html>
